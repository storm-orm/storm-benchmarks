name: benchmark

on:
  workflow_dispatch:
    inputs:
      mode:
        description: Benchmark mode
        type: choice
        options:
          - full
          - quick
        default: full
      runner:
        description: GitHub-hosted runner label (default ubuntu-latest; use a larger-runner label for steadier numbers)
        type: string
        default: ubuntu-latest
      storm_ref:
        description: storm-framework ref (branch, tag, or sha) to build and benchmark
        type: string
        default: main
      storm_version:
        description: Storm version to resolve (defaults to the version in gradle/libs.versions.toml)
        type: string
        required: false

permissions:
  contents: read

jobs:
  benchmark:
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Override Storm version
        if: inputs.storm_version != ''
        run: |
          sed -i 's/^storm = ".*"/storm = "${{ inputs.storm_version }}"/' gradle/libs.versions.toml
          grep '^storm = ' gradle/libs.versions.toml

      - name: Resolve Storm version
        id: storm
        run: echo "version=$(sed -n 's/^storm = "\(.*\)"/\1/p' gradle/libs.versions.toml)" >> "$GITHUB_OUTPUT"

      # Storm is not yet on Maven Central, so build it from source into the local Maven repository. This also lets
      # the suite benchmark any unreleased storm-framework ref, not only published versions.
      - name: Checkout storm-framework
        uses: actions/checkout@v4
        with:
          repository: storm-orm/storm-framework
          ref: ${{ inputs.storm_ref }}
          path: storm-framework

      - name: Build Storm into the local Maven repository
        working-directory: storm-framework
        run: ./mvnw -B -ntp -DskipTests -Dmaven.javadoc.skip=true install -Drevision=${{ steps.storm.outputs.version }}

      # The st.orm Gradle plugin is a standalone Gradle build, not part of the Maven reactor, so publish it to
      # the local Maven repository separately (mirroring -Drevision with -Pversion).
      - name: Publish the Storm Gradle plugin into the local Maven repository
        working-directory: storm-framework/storm-gradle-plugin
        run: ./gradlew --no-daemon publishToMavenLocal -Pversion=${{ steps.storm.outputs.version }}

      - name: Run benchmarks
        run: |
          if [ "${{ inputs.mode }}" = "quick" ]; then
            scripts/run.sh --quick
          else
            scripts/run.sh
          fi

      - name: Publish job summary
        run: cat results/summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            results/*.json
            results/summary.md
